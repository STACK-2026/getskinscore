name: Rebuild Guard · Daily touch for scheduled articles

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  touch:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "SkinScore Rebuild Guard"
          git config user.email "rebuild@getskinscore.com"

      - name: Touch rebuild marker
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "${DATE}" > site/.last-rebuild.txt

      - name: Commit and push if changed
        run: |
          git add site/.last-rebuild.txt
          if git diff --cached --quiet; then
            echo "No marker change (already touched today)"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: rebuild guard ${DATE}"
            # Resist concurrent pushes: rebase on remote, retry up to 3 times.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main || true
              if git push; then exit 0; fi
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
            echo "push failed after 3 attempts" >&2
            exit 1
          fi
