name: Enrich Ingredient · Weekly

# Generates a deep-dive review for the next ingredient in the queue via
# Mistral (draft) + Claude Sonnet (audit only). Claude API usage is
# capped to a single ~1500-token audit call per run.
#
# Runs every Sunday at 05:42 UTC. Random-free to keep GH scheduler happy,
# the publish moment inside the job is deterministic (no jitter needed:
# there is no user-facing publication window).

on:
  schedule:
    - cron: '42 5 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        type: choice
        options: ['false', 'true']
        default: 'false'

permissions:
  contents: write

concurrency:
  group: enrich-ingredient-${{ github.ref }}
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        working-directory: scripts
        run: |
          python3 -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run enrichment
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          python3 enrich_ingredient.py $ARGS
